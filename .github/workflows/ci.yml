name: CI - Lint and Validate

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Lint with flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on src/
        run: |
          flake8 src/ \
            --max-line-length=120 \
            --exclude=_pycache_ \
            --ignore=F541,W293,W292,E302,E303,W291,E501,F401,W503 \
            --statistics \
            --count
